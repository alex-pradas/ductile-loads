name: Deploy docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - run: pip install mkdocs-material "mkdocs<2" mkdocs-llmstxt "mkdocstrings[python]"

      - run: pip install .

      - run: mkdocs gh-deploy --force
